services:
  navi-core:
    image: ghcr.io/cuti27/navi/navi-core:latest
    build:
      context: .
      dockerfile: navi-core/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - navi-data:/app/data
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-opencode}
      - AI_PROVIDER_API_URL=${AI_PROVIDER_API_URL:-https://opencode.ai/zen/go/v1}
      - AI_PROVIDER_API_KEY=${AI_PROVIDER_API_KEY}
      - AI_MODEL=${AI_MODEL:-deepseek-v4-flash}
      - MASTER_TOKEN=${MASTER_TOKEN}
      - AI_SYSTEM_PROMPT=${AI_SYSTEM_PROMPT:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - COMPACTION_THRESHOLD=${COMPACTION_THRESHOLD:-30}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - EXA_API_KEY=${EXA_API_KEY:-}

  frontend:
    image: ghcr.io/cuti27/navi/navi-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://navi-core:3000/api/v1

volumes:
  navi-data:
