<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navi Core - Testing UI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f11;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 320px;
            background: #18181b;
            border-right: 1px solid #27272a;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }
        .sidebar h1 { font-size: 1.25rem; color: #fafafa; }
        .api-base {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .api-base label {
            font-size: 0.75rem;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .api-base input {
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #e4e4e7;
            padding: 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
        }
        .panel {
            background: #27272a;
            border-radius: 0.5rem;
            padding: 0.75rem;
        }
        .panel h2 {
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: #d4d4d8;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            width: 100%;
        }
        button:hover { background: #2563eb; }
        .list {
            list-style: none;
            margin-top: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }
        .list li {
            background: #18181b;
            border: 1px solid #3f3f46;
            border-radius: 0.375rem;
            padding: 0.5rem;
            font-size: 0.8125rem;
        }
        .list li.status-connected { border-left: 3px solid #22c55e; }
        .list li.status-error { border-left: 3px solid #ef4444; }
        .list li.status-disabled,
        .list li.status-connecting { border-left: 3px solid #a1a1aa; }
        .tool-item {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        .tool-item input[type="checkbox"] { margin-top: 0.125rem; }
        .tool-item .tool-info { flex: 1; }
        .tool-item .tool-name { font-weight: 500; color: #fafafa; }
        .tool-item .tool-desc {
            color: #a1a1aa;
            font-size: 0.75rem;
            margin-top: 0.125rem;
        }
        .error { color: #ef4444; font-size: 0.8125rem; margin-top: 0.25rem; }
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 1rem;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding-right: 0.5rem;
        }
        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .message.assistant {
            align-self: flex-start;
            background: #27272a;
            color: #e4e4e7;
            border-bottom-left-radius: 0.25rem;
        }
        .message.loading::after {
            content: "▋";
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .input-area {
            display: flex;
            gap: 0.5rem;
        }
        .input-area textarea {
            flex: 1;
            background: #18181b;
            border: 1px solid #3f3f46;
            color: #e4e4e7;
            padding: 0.75rem;
            border-radius: 0.5rem;
            resize: none;
            font-family: inherit;
            font-size: 0.9375rem;
        }
        .input-area button {
            width: auto;
            padding: 0.75rem 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1>Navi Core Test</h1>
            <div class="api-base">
                <label for="apiBase">API Base</label>
                <input type="text" id="apiBase" value="http://localhost:3000/api/v1">
            </div>

            <section class="panel">
                <h2>MCP Services</h2>
                <button id="loadServices">Cargar servicios</button>
                <ul id="servicesList" class="list"></ul>
            </section>

            <section class="panel">
                <h2>MCP Tools</h2>
                <button id="loadTools">Cargar tools</button>
                <ul id="toolsList" class="list tools-list"></ul>
            </section>
        </aside>

        <main class="chat">
            <div id="messages" class="messages"></div>
            <form id="chatForm" class="input-area">
                <textarea id="messageInput" placeholder="Escribe un mensaje..." rows="2" required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </main>
    </div>

    <script>
        const $ = (selector) => document.querySelector(selector)

        function apiBase() {
            return $("#apiBase").value.replace(/\/$/, "")
        }

        async function getJson(path) {
            const res = await fetch(`${apiBase()}${path}`)
            if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`)
            return res.json()
        }

        async function postJson(path, body) {
            return fetch(`${apiBase()}${path}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            })
        }

        async function patchJson(path, body) {
            return fetch(`${apiBase()}${path}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            })
        }

        function addMessage(role, text = "", streaming = false) {
            const messages = $("#messages")
            const div = document.createElement("div")
            div.className = `message ${role}${streaming ? " loading" : ""}`
            div.textContent = text
            messages.appendChild(div)
            messages.scrollTop = messages.scrollHeight
            return div
        }

        function escapeHtml(text) {
            const div = document.createElement("div")
            div.textContent = text
            return div.innerHTML
        }

        async function loadServices() {
            const list = $("#servicesList")
            list.innerHTML = "<li>Cargando...</li>"

            try {
                const services = await getJson("/mcp/services")
                list.innerHTML = ""

                if (services.length === 0) {
                    list.innerHTML = "<li>No hay servicios configurados</li>"
                    return
                }

                for (const s of services) {
                    const li = document.createElement("li")
                    li.className = `status-${s.status}`
                    li.innerHTML = `
                        <div><strong>${escapeHtml(s.name)}</strong> — ${escapeHtml(s.status)}</div>
                        <div class="tool-desc">${escapeHtml(s.url)}</div>
                        ${s.tools.length ? `<div class="tool-desc">Tools: ${s.tools.map(escapeHtml).join(", ")}</div>` : ""}
                        ${s.error ? `<div class="error">${escapeHtml(s.error)}</div>` : ""}
                    `
                    list.appendChild(li)
                }
            } catch (err) {
                list.innerHTML = `<li class="error">${escapeHtml(err.message)}</li>`
            }
        }

        async function loadTools() {
            const list = $("#toolsList")
            list.innerHTML = "<li>Cargando...</li>"

            try {
                const tools = await getJson("/mcp/tools")
                list.innerHTML = ""

                if (tools.length === 0) {
                    list.innerHTML = "<li>No hay tools disponibles</li>"
                    return
                }

                for (const t of tools) {
                    const li = document.createElement("li")
                    li.className = "tool-item"
                    li.innerHTML = `
                        <input type="checkbox" id="tool-${t.name}" ${t.enabled ? "checked" : ""}>
                        <div class="tool-info">
                            <div class="tool-name">${escapeHtml(t.name)}</div>
                            <div class="tool-desc">${escapeHtml(t.description || "Sin descripción")}</div>
                            <div class="tool-desc">Server: ${escapeHtml(t.serverName)}</div>
                        </div>
                    `
                    const checkbox = li.querySelector("input")
                    checkbox.addEventListener("change", async () => {
                        try {
                            await patchJson(`/mcp/tools/${encodeURIComponent(t.name)}`, { enabled: checkbox.checked })
                        } catch (err) {
                            checkbox.checked = !checkbox.checked
                            alert(`Error: ${err.message}`)
                        }
                    })
                    list.appendChild(li)
                }
            } catch (err) {
                list.innerHTML = `<li class="error">${escapeHtml(err.message)}</li>`
            }
        }

        async function sendMessage(message) {
            addMessage("user", message)
            const assistantMsg = addMessage("assistant", "", true)

            try {
                const res = await postJson("/chat", { message })
                if (!res.ok || !res.body) {
                    throw new Error(`${res.status}: ${await res.text()}`)
                }

                const reader = res.body.getReader()
                const decoder = new TextDecoder()
                let buffer = ""

                while (true) {
                    const { done, value } = await reader.read()
                    if (done) break

                    buffer += decoder.decode(value, { stream: true })
                    const lines = buffer.split("\n")
                    buffer = lines.pop() || ""

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            assistantMsg.textContent += line.slice(6)
                            $("#messages").scrollTop = $("#messages").scrollHeight
                        }
                    }
                }
            } catch (err) {
                assistantMsg.textContent = `Error: ${err.message}`
                assistantMsg.classList.add("error")
            } finally {
                assistantMsg.classList.remove("loading")
                $("#messages").scrollTop = $("#messages").scrollHeight
            }
        }

        $("#loadServices").addEventListener("click", loadServices)
        $("#loadTools").addEventListener("click", loadTools)

        $("#chatForm").addEventListener("submit", async (e) => {
            e.preventDefault()
            const input = $("#messageInput")
            const message = input.value.trim()
            if (!message) return

            input.value = ""
            await sendMessage(message)
        })

        $("#messageInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault()
                $("#chatForm").dispatchEvent(new Event("submit"))
            }
        })
    </script>
</body>
</html>
