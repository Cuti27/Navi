<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navi Core Test</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0f0f11;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: #18181b;
            border-right: 1px solid #27272a;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 1rem;
        }

        h1 {
            font-size: 1.25rem;
        }

        h2 {
            font-size: 1rem;
            margin-bottom: .5rem;
        }

        label {
            font-size: .75rem;
            color: #a1a1aa;
            text-transform: uppercase;
            display: block;
            margin-bottom: .25rem;
        }

        input,
        textarea {
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #e4e4e7;
            padding: .5rem;
            border-radius: .375rem;
            width: 100%;
            font-family: inherit;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: .5rem .75rem;
            border-radius: .375rem;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #3f3f46;
            cursor: not-allowed;
        }

        .panel {
            background: #27272a;
            border-radius: .5rem;
            padding: .75rem;
        }

        .list {
            list-style: none;
            margin-top: .5rem;
            display: flex;
            flex-direction: column;
            gap: .375rem;
        }

        .list li {
            background: #18181b;
            border: 1px solid #3f3f46;
            border-radius: .375rem;
            padding: .5rem;
            font-size: .8125rem;
            cursor: pointer;
        }

        .list li.active {
            border-color: #3b82f6;
            background: #1e293b;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: .75rem;
            padding-right: .5rem;
        }

        .message {
            max-width: 80%;
            padding: .75rem 1rem;
            border-radius: .75rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background: #27272a;
            color: #e4e4e7;
            border: 1px solid #3f3f46;
        }

        .input-area {
            display: flex;
            gap: .5rem;
        }

        .input-area textarea {
            flex: 1;
            resize: none;
        }

        .input-area button {
            width: auto;
        }

        .error {
            color: #ef4444;
            font-size: .8125rem;
        }

        small {
            color: #a1a1aa;
        }
    </style>
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <h1>Navi Test</h1>
            
            <div class="panel">
                <label>API Base</label>
                <input id="apiBase" value="http://localhost:3000/api/v1">
                <label style="margin-top:.5rem">Master Token</label>
                <input id="masterToken" value="supersecret" type="password">
            </div>

            <div class="panel">
                <h2>Sesiones</h2>
                <label>Nueva sesión</label>
                <input id="sessionTitle" placeholder="Título (opcional)">
                <button id="createSession" style="margin-top:.5rem">Crear sesión</button>
                <ul id="sessionsList" class="list"></ul>
            </div>
            
            <div class="panel">
                <h2>MCP</h2>
                <button id="loadServices">Cargar servicios</button>
                <ul id="servicesList" class="list"></ul>
                <button id="loadTools" style="margin-top:.5rem">Cargar tools</button>
                <ul id="toolsList" class="list"></ul>
                </div>
        </aside>

        <main class="main">
            <div class="panel">
                <h2 id="currentSession">Ninguna sesión seleccionada</h2>
            </div>
            <div id="messages" class="messages"></div>
            <form id="chatForm" class="input-area">
                <textarea id="messageInput" rows="2" placeholder="Escribe tu mensaje..." required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </main>
    </div>

    <script>
            const $ = id => document.getElementById(id);
            let selectedSessionId = null;

            function headers() {
                return {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + $('masterToken').value
                };
            }

            function api(path) {
                return $('apiBase').value.replace(/\/$/, '') + path;
        }

        async function getJson(path) {
            const r = await fetch(api(path), { headers: headers() });
            if (!r.ok) throw new Error(r.status + ': ' + await r.text());
            return r.json();
        }

        async function postJson(path, body) {
            return fetch(api(path), { method: 'POST', headers: headers(), body: JSON.stringify(body) });
        }

            function escapeHtml(t) {
                const d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
        }

            function addMessage(role, text) {
                const d = document.createElement('div');
                d.className = 'message ' + role;
                d.textContent = text;
                $('messages').appendChild(d);
                $('messages').scrollTop = $('messages').scrollHeight;
                return d;
        }

            async function loadSessions() {
                $('sessionsList').innerHTML = '<li>Cargando...</li>';
            try {
                const sessions = await getJson('/sessions');
                $('sessionsList').innerHTML = '';
                sessions.forEach(s => {
                    const li = document.createElement('li');
                    li.textContent = s.title || s.id;
                    li.dataset.id = s.id;
                    li.className = s.id === selectedSessionId ? 'active' : '';
                    li.onclick = () => selectSession(s.id, s.title || s.id);
                    $('sessionsList').appendChild(li);
                });
            } catch (e) {
                $('sessionsList').innerHTML = '<li class="error">' + escapeHtml(e.message) + '</li>';
            }
        }

            async function selectSession(id, title) {
                selectedSessionId = id;
                $('currentSession').textContent = title;
                $('messages').innerHTML = '';
                document.querySelectorAll('#sessionsList li').forEach(li => li.classList.toggle('active', li.dataset.id === id));
                try {
                    const data = await getJson('/sessions/' + id);
                    data.messages.slice().reverse().forEach(m => addMessage(m.role, m.content));
                } catch (e) {
                    addMessage('assistant', 'Error cargando historial: ' + e.message);
            }
        }

            $('createSession').onclick = async () => {
            try {
                const body = {};
                const title = $('sessionTitle').value.trim();
                if (title) body.title = title;
                const r = await postJson('/sessions', body);
                if (!r.ok) throw new Error(r.status + ': ' + await r.text());
                const s = await r.json();
                $('sessionTitle').value = '';
                await loadSessions();
                await selectSession(s.id, s.title || s.id);
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

            $('loadServices').onclick = async () => {
                $('servicesList').innerHTML = '<li>Cargando...</li>';
                try {
                const services = await getJson('/mcp/services');
                $('servicesList').innerHTML = '';
                services.forEach(s => {
                    const li = document.createElement('li');
                    li.innerHTML = '<strong>' + escapeHtml(s.name) + '</strong> (' + (s.status || '?') + ')<br><small>' + escapeHtml(s.url) + '</small>';
                    $('servicesList').appendChild(li);
                });
            } catch (e) {
                $('servicesList').innerHTML = '<li class="error">' + escapeHtml(e.message) + '</li>';
            }
        };

            $('loadTools').onclick = async () => {
                $('toolsList').innerHTML = '<li>Cargando...</li>';
            try {
                const tools = await getJson('/mcp/tools');
                $('toolsList').innerHTML = '';
                tools.forEach(t => {
                    const li = document.createElement('li');
                    li.innerHTML = '<strong>' + escapeHtml(t.name) + '</strong> (' + (t.enabled ? 'on' : 'off') + ')<br><small>' + escapeHtml(t.serverName || '') + '</small>';
                    $('toolsList').appendChild(li);
                });
            } catch (e) {
                $('toolsList').innerHTML = '<li class="error">' + escapeHtml(e.message) + '</li>';
            }
        };

            $('chatForm').onsubmit = async e => {
                e.preventDefault();
                if (!selectedSessionId) return alert('Selecciona o crea una sesión primero');
                const msg = $('messageInput').value.trim();
                if (!msg) return;
                $('messageInput').value = '';
                addMessage('user', msg);
                const assistant = addMessage('assistant', '');
                try {
                    const r = await postJson('/chat', { sessionId: selectedSessionId, message: msg });
                    if (!r.ok || !r.body) throw new Error(r.status + ': ' + await r.text());
                    const reader = r.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            assistant.textContent += line.slice(6);
                            $('messages').scrollTop = $('messages').scrollHeight;
                        }
                    }
                }
            } catch (err) {
                assistant.textContent = 'Error: ' + err.message;
                assistant.classList.add('error');
            }
        };

            loadSessions();
    </script>
</body>

</html>
