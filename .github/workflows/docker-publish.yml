name: CI - Test, Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck backend
        run: pnpm --filter navi-core exec tsc --noEmit

      - name: Typecheck frontend
        run: pnpm --filter frontend typecheck

      - name: Test backend
        run: pnpm --filter navi-core test

      - name: Test frontend
        run: pnpm --filter frontend test

  build-core:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Lowercase repository
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: navi-core/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/navi-core:latest
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/navi-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/navi-core:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/navi-core:${{ github.sha }}
          format: sarif
          output: trivy-core.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - uses: github/codeql-action/upload-sarif@35632bdbd38dba649ce80e15482f7a399a32d400 # v3.27.9
        with:
          sarif_file: trivy-core.sarif

  build-frontend:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Lowercase repository
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/navi-frontend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/navi-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/navi-frontend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/navi-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - uses: github/codeql-action/upload-sarif@35632bdbd38dba649ce80e15482f7a399a32d400 # v3.27.9
        with:
          sarif_file: trivy-frontend.sarif
